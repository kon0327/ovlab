[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ovlab-benchmarks"
version = "0.1.0"
description = "Abstract benchmark adapter boundary for OpenVLABenchmark"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["ovlab-core>=0.1.0"]

[tool.setuptools.packages.find]
where = ["src"]

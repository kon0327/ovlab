[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "ovlab-openvla-common"
version = "0.1.0"
description = "Dependency-light OpenVLA contracts and codecs for OVLAB"
readme = "README.md"
requires-python = ">=3.10"
dependencies = ["ovlab-core>=0.1.0", "numpy>=1.24"]

[tool.setuptools.packages.find]
where = ["src"]

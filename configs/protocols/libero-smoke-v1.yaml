schema_version: "0.1.0"
kind: protocol
id: libero-smoke-v1

execution:
  rollouts_per_task: 1
  base_seed: 42
  maximum_episode_steps: 5

  action_chunks:
    mode: receding_horizon
    replan_interval: 1

  episode_errors: stop_run
  unavailable_metrics: allow_unavailable

recording:
  observations: true
  images: false
  proprioception: false
  predictions: true
  raw_policy_output: false
  evaluation_signals: true
  privileged_signals: false

reproducibility:
  reject_dirty_external_repositories: true
  require_checkpoint_identity: true

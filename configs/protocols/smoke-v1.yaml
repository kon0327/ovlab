schema_version: "0.1.0"
kind: protocol
id: smoke-v1

execution:
  rollouts_per_task: 2
  base_seed: 17
  maximum_episode_steps: 3

  action_chunks:
    mode: receding_horizon
    replan_interval: 1

  episode_errors: stop_run
  unavailable_metrics: allow_unavailable

recording:
  observations: true
  images: false
  proprioception: true
  predictions: true
  raw_policy_output: true
  evaluation_signals: true
  privileged_signals: true

reproducibility:
  reject_dirty_external_repositories: true
  require_checkpoint_identity: false
